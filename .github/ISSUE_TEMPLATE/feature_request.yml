name: Feature request
description: Suggest an enhancement or a new AN0037 message
labels: ["enhancement"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind of request
      options:
        - Add a new AN0037 message to the curated database
        - New CLI flag or operation mode
        - Build/portability improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Use case
      description: What problem would this solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        For a new message, include the message ID (and sub-ID if any),
        a link or reference to the AN0037 section, and the field table.

        For a new CLI flag, sketch the expected invocation and output.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other ways to solve the same problem.
