name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (static)
        run: make LDFLAGS="-static"
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          PKG="gnss_tool-${VERSION}-linux-x86_64"
          mkdir "$PKG"
          cp gnss_tool README.md LICENSE CHANGELOG.md "$PKG/"
          tar -czf "${PKG}.tar.gz" "$PKG"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: '*.tar.gz'

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make
            zip
      - name: Build (static)
        run: make LDFLAGS="-static"
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          PKG="gnss_tool-${VERSION}-windows-x86_64"
          mkdir "$PKG"
          cp gnss_tool.exe README.md LICENSE CHANGELOG.md "$PKG/"
          zip -r "${PKG}.zip" "$PKG"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: '*.zip'

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
