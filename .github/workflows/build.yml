name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ${{ matrix.cc }}

      - name: Build
        env:
          CC: ${{ matrix.cc }}
        run: make

      - name: Run end-to-end tests against fake_gnss.py
        run: ./run_tests.sh

      - name: Upload binary
        if: matrix.cc == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: gnss_tool-linux-x86_64
          path: gnss_tool

  windows:
    name: Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make

      - name: Build
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gnss_tool-windows-x86_64
          path: gnss_tool.exe
